services:
  database:
    image: postgres:16-alpine
    container_name: traffic-intelligence-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: traffic_intelligence
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_password

    ports:
      - "5432:5432"

    volumes:
      - traffic_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U traffic_user -d traffic_intelligence",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  traffic_postgres_data: